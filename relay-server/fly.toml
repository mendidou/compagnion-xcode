# fly.toml app configuration file for simulatormirror-relay

app = 'simulatormirror-relay'
primary_region = 'fra'

[build]

[env]
  PORT = "8765"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
